<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="475" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Benchmark &amp; Evaluation Flow</text>
  <text x="475" y="50" text-anchor="middle" font-size="11" fill="#64748b">run_eval.py — Meeting-level Retrieval Evaluation on QMSum qrels</text>

  <!-- Input Data -->
  <rect x="20" y="70" width="200" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">INPUT DATA</text>
  <text x="35" y="110" font-size="10" fill="#78350f">• qmsum_queries.jsonl</text>
  <text x="35" y="126" font-size="10" fill="#78350f">• qrels.jsonl (ground truth)</text>
  <text x="35" y="142" font-size="10" fill="#78350f">• ES index (indexed chunks)</text>
  <text x="35" y="158" font-size="9" fill="#6b7280">  query_id → relevant meeting_ids</text>

  <!-- Arrow -->
  <line x1="220" y1="120" x2="270" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Eval Loop -->
  <rect x="275" y="70" width="380" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="465" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">EVALUATION LOOP (per query)</text>
  <text x="290" y="110" font-size="10" fill="#1e3a8a">1. search_meetings(query, mode, channel, top_k)</text>
  <text x="290" y="126" font-size="10" fill="#1e3a8a">2. Get ranked meeting_ids from results</text>
  <text x="290" y="142" font-size="10" fill="#1e3a8a">3. Compare vs qrels (relevant set)</text>
  <text x="290" y="158" font-size="10" fill="#1e3a8a">4. Measure latency (perf_counter)</text>

  <!-- Arrow -->
  <line x1="655" y1="120" x2="700" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Metrics -->
  <rect x="705" y="70" width="225" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="817" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">METRICS OUTPUT</text>
  <text x="720" y="110" font-size="10" fill="#14532d">• Precision@k</text>
  <text x="720" y="126" font-size="10" fill="#14532d">• Recall@k</text>
  <text x="720" y="142" font-size="10" fill="#14532d">• MRR (Mean Reciprocal Rank)</text>
  <text x="720" y="158" font-size="10" fill="#14532d">• NDCG@k, Latency p50/p95</text>

  <!-- Matrix Comparison -->
  <rect x="20" y="200" width="910" height="160" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="40" y="222" font-size="11" font-weight="bold" fill="#5b21b6">MATRIX COMPARISON (--matrix flag)</text>
  <text x="40" y="240" font-size="10" fill="#6b7280">So sánh tất cả cấu hình mode × channel để tìm config tối ưu</text>

  <!-- Table header -->
  <rect x="40" y="252" width="870" height="22" rx="3" fill="#ede9fe"/>
  <text x="120" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">Config</text>
  <text x="280" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">Mode</text>
  <text x="400" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">Channel</text>
  <text x="520" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">P@10</text>
  <text x="610" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">R@10</text>
  <text x="700" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">MRR</text>
  <text x="790" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">NDCG@10</text>
  <text x="880" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">Latency</text>

  <!-- Table rows -->
  <rect x="40" y="276" width="870" height="20" rx="2" fill="#fff"/>
  <text x="120" y="290" text-anchor="middle" font-size="9" fill="#374151">1</text>
  <text x="280" y="290" text-anchor="middle" font-size="9" fill="#374151">bm25</text>
  <text x="400" y="290" text-anchor="middle" font-size="9" fill="#374151">content</text>
  <text x="520" y="290" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="610" y="290" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="700" y="290" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="790" y="290" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="880" y="290" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>

  <rect x="40" y="298" width="870" height="20" rx="2" fill="#f8fafc"/>
  <text x="120" y="312" text-anchor="middle" font-size="9" fill="#374151">2</text>
  <text x="280" y="312" text-anchor="middle" font-size="9" fill="#374151">semantic</text>
  <text x="400" y="312" text-anchor="middle" font-size="9" fill="#374151">content</text>
  <text x="520" y="312" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="610" y="312" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="700" y="312" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="790" y="312" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="880" y="312" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>

  <rect x="40" y="320" width="870" height="20" rx="2" fill="#fff"/>
  <text x="120" y="334" text-anchor="middle" font-size="9" fill="#374151">3</text>
  <text x="280" y="334" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">hybrid</text>
  <text x="400" y="334" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">content</text>
  <text x="520" y="334" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="610" y="334" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="700" y="334" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="790" y="334" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>
  <text x="880" y="334" text-anchor="middle" font-size="9" fill="#dc2626">TBD</text>

  <text x="475" y="350" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">⚠ Chưa có kết quả — cần chạy: make up → make index → make evaluate --matrix</text>

  <!-- Workflow Steps -->
  <rect x="20" y="380" width="910" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="402" font-size="11" font-weight="bold" fill="#334155">EXECUTION WORKFLOW (Minimum Viable Benchmark)</text>

  <!-- Step boxes -->
  <rect x="40" y="415" width="150" height="55" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="115" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Step 1</text>
  <text x="115" y="450" text-anchor="middle" font-size="9" fill="#78350f">docker compose up</text>
  <text x="115" y="462" text-anchor="middle" font-size="9" fill="#6b7280">(ES on :9201)</text>
  <line x1="190" y1="442" x2="215" y2="442" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="220" y="415" width="150" height="55" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="295" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Step 2</text>
  <text x="295" y="450" text-anchor="middle" font-size="9" fill="#1e3a8a">make index</text>
  <text x="295" y="462" text-anchor="middle" font-size="9" fill="#6b7280">(sample: ~1.5MB)</text>
  <line x1="370" y1="442" x2="395" y2="442" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="400" y="415" width="150" height="55" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="475" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Step 3</text>
  <text x="475" y="450" text-anchor="middle" font-size="9" fill="#14532d">make evaluate</text>
  <text x="475" y="462" text-anchor="middle" font-size="9" fill="#6b7280">(--matrix --limit 20)</text>
  <line x1="550" y1="442" x2="575" y2="442" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="580" y="415" width="150" height="55" rx="5" fill="#fae8ff" stroke="#a855f7"/>
  <text x="655" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#6b21a8">Step 4</text>
  <text x="655" y="450" text-anchor="middle" font-size="9" fill="#581c87">Save results</text>
  <text x="655" y="462" text-anchor="middle" font-size="9" fill="#6b7280">(eval_results.json)</text>
  <line x1="730" y1="442" x2="755" y2="442" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="760" y="415" width="150" height="55" rx="5" fill="#fee2e2" stroke="#ef4444"/>
  <text x="835" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Step 5</text>
  <text x="835" y="450" text-anchor="middle" font-size="9" fill="#7f1d1d">Compare configs</text>
  <text x="835" y="462" text-anchor="middle" font-size="9" fill="#6b7280">(best mode/channel)</text>

  <!-- Key insight -->
  <rect x="40" y="485" width="870" height="55" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="475" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">⚠ CRITICAL GAP: Benchmark chưa bao giờ được chạy</text>
  <text x="475" y="522" text-anchor="middle" font-size="10" fill="#7f1d1d">Code evaluation hoàn chỉnh nhưng thiếu evidence: không có file kết quả, không có số liệu P/R/MRR.</text>
  <text x="475" y="536" text-anchor="middle" font-size="10" fill="#7f1d1d">Ưu tiên #1: Chạy benchmark trên processed_sample (~1.5MB) để có kết quả nhanh nhất.</text>
</svg>
