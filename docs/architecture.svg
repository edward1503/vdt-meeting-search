<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">VDT Meeting Search — System Architecture</text>

  <!-- User Layer -->
  <rect x="30" y="55" width="840" height="80" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="78" font-size="11" fill="#0369a1" font-weight="bold">USER LAYER</text>
  <rect x="60" y="88" width="140" height="36" rx="5" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="130" y="111" text-anchor="middle" font-size="12" fill="#0c4a6e">Demo UI (HTML)</text>
  <rect x="230" y="88" width="160" height="36" rx="5" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="310" y="111" text-anchor="middle" font-size="12" fill="#0c4a6e">curl / HTTP Client</text>
  <rect x="420" y="88" width="180" height="36" rx="5" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="510" y="111" text-anchor="middle" font-size="12" fill="#0c4a6e">Evaluation Script</text>

  <!-- API Layer -->
  <rect x="30" y="155" width="840" height="100" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="178" font-size="11" fill="#166534" font-weight="bold">API LAYER — FastAPI (port 8000)</text>
  <rect x="60" y="190" width="130" height="50" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="212" text-anchor="middle" font-size="11" fill="#14532d">POST /search</text>
  <text x="125" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Hybrid Search</text>
  <rect x="210" y="190" width="150" height="50" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="285" y="212" text-anchor="middle" font-size="11" fill="#14532d">POST /meetings</text>
  <text x="285" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Real-time Ingest</text>
  <rect x="380" y="190" width="150" height="50" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="455" y="212" text-anchor="middle" font-size="11" fill="#14532d">PUT/DELETE</text>
  <text x="455" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Meeting CRUD</text>
  <rect x="550" y="190" width="130" height="50" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="212" text-anchor="middle" font-size="11" fill="#14532d">GET /health</text>
  <text x="615" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Status Check</text>
  <rect x="700" y="190" width="150" height="50" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="775" y="212" text-anchor="middle" font-size="11" fill="#14532d">Auth Middleware</text>
  <text x="775" y="228" text-anchor="middle" font-size="10" fill="#6b7280">X-API-Key</text>

  <!-- Core Logic Layer -->
  <rect x="30" y="275" width="840" height="120" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="298" font-size="11" fill="#854d0e" font-weight="bold">CORE LOGIC</text>
  <rect x="60" y="310" width="180" height="70" rx="5" fill="#fff" stroke="#eab308" stroke-width="1.5"/>
  <text x="150" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Query Understanding</text>
  <text x="150" y="350" text-anchor="middle" font-size="10" fill="#6b7280">Rule-based NLU</text>
  <text x="150" y="365" text-anchor="middle" font-size="10" fill="#6b7280">source/speaker/date</text>
  <rect x="270" y="310" width="180" height="70" rx="5" fill="#fff" stroke="#eab308" stroke-width="1.5"/>
  <text x="360" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Hybrid Search</text>
  <text x="360" y="350" text-anchor="middle" font-size="10" fill="#6b7280">BM25 + kNN + RRF</text>
  <text x="360" y="365" text-anchor="middle" font-size="10" fill="#6b7280">Meeting Aggregation</text>
  <rect x="480" y="310" width="180" height="70" rx="5" fill="#fff" stroke="#eab308" stroke-width="1.5"/>
  <text x="570" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Embedding</text>
  <text x="570" y="350" text-anchor="middle" font-size="10" fill="#6b7280">all-MiniLM-L6-v2</text>
  <text x="570" y="365" text-anchor="middle" font-size="10" fill="#6b7280">384-dim, cosine</text>
  <rect x="690" y="310" width="160" height="70" rx="5" fill="#fff" stroke="#eab308" stroke-width="1.5"/>
  <text x="770" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Chunking</text>
  <text x="770" y="350" text-anchor="middle" font-size="10" fill="#6b7280">Speaker-aware</text>
  <text x="770" y="365" text-anchor="middle" font-size="10" fill="#6b7280">512 tok, 100 overlap</text>

  <!-- Data Layer -->
  <rect x="30" y="415" width="840" height="90" rx="8" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="438" font-size="11" fill="#9d174d" font-weight="bold">DATA LAYER</text>
  <rect x="60" y="450" width="250" height="44" rx="5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <text x="185" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">Elasticsearch 8.15</text>
  <text x="185" y="485" text-anchor="middle" font-size="10" fill="#6b7280">BM25 index + dense_vector (kNN)</text>
  <rect x="340" y="450" width="200" height="44" rx="5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <text x="440" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">Processed Data</text>
  <text x="440" y="485" text-anchor="middle" font-size="10" fill="#6b7280">chunks.jsonl + meetings.jsonl</text>
  <rect x="570" y="450" width="280" height="44" rx="5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <text x="710" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">Raw Corpus</text>
  <text x="710" y="485" text-anchor="middle" font-size="10" fill="#6b7280">AMI Meeting Corpus + QMSum</text>

  <!-- Infrastructure -->
  <rect x="30" y="525" width="840" height="75" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="548" font-size="11" fill="#5b21b6" font-weight="bold">INFRASTRUCTURE</text>
  <rect x="60" y="558" width="160" height="32" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="140" y="579" text-anchor="middle" font-size="11" fill="#4c1d95">Docker Compose</text>
  <rect x="240" y="558" width="140" height="32" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="310" y="579" text-anchor="middle" font-size="11" fill="#4c1d95">GitHub CI</text>
  <rect x="400" y="558" width="140" height="32" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="470" y="579" text-anchor="middle" font-size="11" fill="#4c1d95">Makefile</text>
  <rect x="560" y="558" width="140" height="32" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="630" y="579" text-anchor="middle" font-size="11" fill="#4c1d95">pytest</text>

  <!-- Arrows -->
  <line x1="130" y1="124" x2="130" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="124" x2="310" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="124" x2="510" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="240" x2="150" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="240" x2="360" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="240" x2="570" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="395" x2="185" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="395" x2="440" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
